name: Deploy to local Mac

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: [self-hosted, mac-mini]
    steps:
      - name: Pull and build
        run: |
          set -euo pipefail
          cd ~/nanoclaw
          git fetch origin main
          git checkout main
          git merge origin/main --ff-only
          npm run build

      - name: Restart NanoClaw
        run: launchctl kickstart -k gui/$(id -u)/com.nanoclaw

      - name: Verify running
        run: |
          sleep 2
          if launchctl print gui/$(id -u)/com.nanoclaw | grep -q 'state = running'; then
            echo "NanoClaw restarted successfully"
          else
            echo "::error::NanoClaw failed to start"
            exit 1
          fi
