name: Notify NanoClaw PR Reviews

on:
  workflow_run:
    workflows: ['CI']
    types: [completed]
  pull_request:
    types: [closed]
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  notify:
    runs-on: [self-hosted, mac-mini]
    permissions:
      actions: read
      checks: read
      contents: read
      pull-requests: read
    env:
      NANOCLAW_GROUP_FOLDER: pr-reviews
    steps:
      - uses: actions/github-script@v7
        id: build-payloads
        env:
          EVENT_NAME: ${{ github.event_name }}
          GROUP_FOLDER: ${{ env.NANOCLAW_GROUP_FOLDER }}
          RUNNER_TEMP: ${{ runner.temp }}
        with:
          script: |
            const fs = require('fs');
            const path = require('path');

            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const payloads = [];

            function isBotLogin(login) {
              return typeof login === 'string' && /\[bot\]$/.test(login);
            }

            async function wait(ms) {
              await new Promise((resolve) => setTimeout(resolve, ms));
            }

            async function getMergeability(prNumber) {
              for (let i = 0; i < 3; i++) {
                const pr = await github.rest.pulls.get({
                  owner,
                  repo,
                  pull_number: prNumber,
                });
                if (pr.data.mergeable !== null) {
                  return {
                    pr: pr.data,
                    mergeability: pr.data.mergeable ? 'mergeable' : 'conflicting',
                  };
                }
                await wait(2000);
              }

              const pr = await github.rest.pulls.get({
                owner,
                repo,
                pull_number: prNumber,
              });
              return {
                pr: pr.data,
                mergeability:
                  pr.data.mergeable === null
                    ? 'unknown'
                    : pr.data.mergeable
                      ? 'mergeable'
                      : 'conflicting',
              };
            }

            const SELF_WORKFLOW = 'Notify NanoClaw PR Reviews';

            async function getCheckResults(headSha) {
              const checks = await github.paginate(github.rest.checks.listForRef, {
                owner,
                repo,
                ref: headSha,
                per_page: 100,
              });

              const nonFailingConclusions = new Set(['success', 'neutral', 'skipped']);
              const runs = checks.filter((c) => c.name !== SELF_WORKFLOW);
              const pending = runs.filter((c) => c.status !== 'completed');
              const failed = runs
                .filter(
                  (c) =>
                    c.status === 'completed' &&
                    !nonFailingConclusions.has(c.conclusion || ''),
                )
                .map((c) => c.name);
              const all = runs.map((c) => ({
                name: c.name,
                status: c.status,
                conclusion: c.conclusion || null,
                summary: (c.output?.summary || '').slice(0, 500),
              }));

              return { pending, failed, all, allCompleted: pending.length === 0 };
            }

            async function getReviewSummary(prNumber) {
              const reviews = await github.paginate(github.rest.pulls.listReviews, {
                owner,
                repo,
                pull_number: prNumber,
                per_page: 100,
              });
              return reviews
                .filter((r) => r.state !== 'PENDING')
                .map((r) => ({
                  author: r.user?.login || 'unknown',
                  state: r.state,
                  body: (r.body || '').slice(0, 500),
                }));
            }

            async function addNotifyPayload(prNumber, workflowRunId) {
              const { pr, mergeability } = await getMergeability(prNumber);
              if (pr.draft) return;
              if (isBotLogin(pr.user?.login)) return;
              if (pr.state !== 'open' || pr.merged || pr.closed_at) return;

              const { pending, failed, all, allCompleted } = await getCheckResults(pr.head.sha);
              if (!allCompleted) {
                core.info(`PR #${prNumber}: ${pending.length} check(s) still running, skipping`);
                return;
              }

              const reviews = await getReviewSummary(prNumber);
              const ciStatus = failed.length > 0 ? 'failure' : 'success';

              payloads.push({
                type: 'github_pr_event',
                action: 'notify',
                groupFolder: process.env.GROUP_FOLDER,
                repoFullName: `${owner}/${repo}`,
                prNumber: pr.number,
                headSha: pr.head.sha,
                workflowRunId: workflowRunId || null,
                prTitle: pr.title,
                branch: pr.head.ref,
                author: pr.user?.login || 'unknown',
                ciStatus,
                mergeability,
                failedChecks: failed,
                checkResults: all,
                reviews,
              });
            }

            if (context.eventName === 'pull_request') {
              const pr = context.payload.pull_request;
              payloads.push({
                type: 'github_pr_event',
                action: 'closed',
                groupFolder: process.env.GROUP_FOLDER,
                repoFullName: `${owner}/${repo}`,
                prNumber: pr.number,
                merged: !!pr.merged,
              });
            } else if (context.eventName === 'workflow_run') {
              const run = context.payload.workflow_run;
              let prs = run.pull_requests || [];
              if (prs.length === 0 && run.head_sha) {
                const associated = await github.rest.repos.listPullRequestsAssociatedWithCommit({
                  owner,
                  repo,
                  commit_sha: run.head_sha,
                });
                prs = associated.data.map((pr) => ({ number: pr.number }));
              }

              for (const pr of prs) {
                await addNotifyPayload(pr.number, run.id);
              }
            } else {
              const prs = await github.paginate(github.rest.pulls.list, {
                owner,
                repo,
                state: 'open',
                per_page: 100,
              });
              if (prs.length === 0) {
                core.info('No open PRs, nothing to do');
              }
              for (const pr of prs) {
                await addNotifyPayload(pr.number, null);
              }
            }

            const outPath = path.join(process.env.RUNNER_TEMP, 'nanoclaw-pr-payloads.json');
            fs.writeFileSync(outPath, JSON.stringify(payloads, null, 2));
            core.setOutput('path', outPath);
            core.setOutput('count', String(payloads.length));

      - name: Send payloads to NanoClaw
        if: steps.build-payloads.outputs.count != '0'
        run: |
          set -euo pipefail
          payload_file="${{ steps.build-payloads.outputs.path }}"
          script="$HOME/nanoclaw/scripts/nanoclaw-notify-pr.sh"

          if ! command -v jq >/dev/null 2>&1; then
            echo "::error::Required tool 'jq' is not installed or not on PATH."
            exit 1
          fi

          if [ ! -f "${payload_file}" ]; then
            echo "::error::Payload file not found: ${payload_file}"
            exit 1
          fi

          if [ ! -f "${script}" ]; then
            echo "::error::NanoClaw notify script not found: ${script}"
            exit 1
          fi

          if [ ! -x "${script}" ]; then
            echo "::error::NanoClaw notify script is not executable: ${script}"
            exit 1
          fi

          fail_count=0
          while IFS= read -r payload; do
            printf '%s\n' "${payload}" | bash "${script}" || {
              status=$?
              echo "::warning::Failed to send payload (exit=${status})"
              fail_count=$((fail_count + 1))
              continue
            }
          done < <(jq -c '.[]' "${payload_file}")

          if [[ "${fail_count}" -gt 0 ]]; then
            echo "::warning::${fail_count} payload(s) failed to deliver"
          fi
